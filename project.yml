name: ayyat
options:
  bundleIdPrefix: com.mostafamahdi
  deploymentTarget:
    iOS: "17.4"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: X6EHA8FBWH
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    # Xcode 26 "Update to recommended settings" knobs — pinned here so they
    # survive xcodegen regens (clicking "Perform Changes" in the IDE only
    # writes to the pbxproj, which we overwrite).
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    LOCALIZED_STRING_SWIFTUI_SUPPORT: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.4.1"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"


targets:
  ayyat:
    type: application
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - path: ayyat
      - path: ayyatWidgets/SharedStorage.swift
    resources:
      - path: ayyat/Resources
      # WhisperKit needs the entire model directory at one resolvable path.
      # xcodegen flattens regular folders into PBXGroups, so we use the
      # `.bundle` suffix — iOS automatically treats `.bundle` directories
      # as single resource bundles (folder reference at build time).
      # Resolved via Bundle.main.url(forResource: "TarteelModels", withExtension: "bundle").
    settings:
      base:
        INFOPLIST_FILE: ayyat/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: ayyat/App/ayyat.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.mostafamahdi.ayyat
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 3
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: GRDB
      - package: WhisperKit
      - target: ayyatWidgets

  ayyatWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - path: ayyatWidgets
    settings:
      base:
        INFOPLIST_FILE: ayyatWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ayyatWidgets/ayyatWidgets.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.mostafamahdi.ayyat.widgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 3
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  ayyatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ayyatTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ayyat

# Explicit scheme so Xcode's scheme dropdown always shows "ayyat" alongside
# "ayyatTests". Without this, xcodegen sometimes auto-generates only the
# test scheme and the app scheme disappears, leaving you with no way to
# Run the app from the IDE.
schemes:
  ayyat:
    build:
      targets:
        ayyat: all
        ayyatWidgets: all
        ayyatTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ayyatTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
